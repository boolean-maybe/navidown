<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="sm-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#444"/>
    </marker>
  </defs>

  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">TCP Connection State Machine</text>

  <!-- states -->
  <!-- CLOSED (initial) -->
  <circle cx="80" cy="80" r="6" fill="#333"/>
  <circle cx="80" cy="80" r="9" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- LISTEN -->
  <rect x="160" y="56" width="110" height="40" rx="20" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="215" y="81" text-anchor="middle" font-size="12" fill="#1565C0">LISTEN</text>

  <!-- SYN_SENT -->
  <rect x="160" y="140" width="110" height="40" rx="20" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="215" y="165" text-anchor="middle" font-size="12" fill="#E65100">SYN_SENT</text>

  <!-- SYN_RCVD -->
  <rect x="350" y="56" width="120" height="40" rx="20" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="410" y="81" text-anchor="middle" font-size="12" fill="#E65100">SYN_RCVD</text>

  <!-- ESTABLISHED -->
  <rect x="340" y="170" width="140" height="44" rx="22" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="410" y="197" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">ESTABLISHED</text>

  <!-- FIN_WAIT_1 -->
  <rect x="140" y="260" width="120" height="40" rx="20" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="200" y="285" text-anchor="middle" font-size="11" fill="#7B1FA2">FIN_WAIT_1</text>

  <!-- FIN_WAIT_2 -->
  <rect x="140" y="340" width="120" height="40" rx="20" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="200" y="365" text-anchor="middle" font-size="11" fill="#7B1FA2">FIN_WAIT_2</text>

  <!-- CLOSE_WAIT -->
  <rect x="380" y="260" width="130" height="40" rx="20" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="445" y="285" text-anchor="middle" font-size="11" fill="#C62828">CLOSE_WAIT</text>

  <!-- TIME_WAIT -->
  <rect x="300" y="340" width="120" height="40" rx="20" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <text x="360" y="365" text-anchor="middle" font-size="11" fill="#F57F17">TIME_WAIT</text>

  <!-- CLOSED (final) -->
  <rect x="500" y="340" width="100" height="40" rx="20" fill="#ECEFF1" stroke="#455A64" stroke-width="2"/>
  <text x="550" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#455A64">CLOSED</text>

  <!-- transitions -->
  <line x1="89" y1="80" x2="158" y2="76" stroke="#444" stroke-width="1.2" marker-end="url(#sm-arrow)"/>
  <text x="120" y="68" font-size="9" fill="#666">passive open</text>

  <line x1="89" y1="85" x2="158" y2="155" stroke="#444" stroke-width="1.2" marker-end="url(#sm-arrow)"/>
  <text x="100" y="130" font-size="9" fill="#666">active open / SYN</text>

  <line x1="270" y1="76" x2="348" y2="76" stroke="#444" stroke-width="1.2" marker-end="url(#sm-arrow)"/>
  <text x="309" y="68" font-size="9" fill="#666">SYN / SYN+ACK</text>

  <line x1="270" y1="160" x2="370" y2="185" stroke="#444" stroke-width="1.2" marker-end="url(#sm-arrow)"/>
  <text x="300" y="165" font-size="9" fill="#666">SYN+ACK / ACK</text>

  <line x1="410" y1="96" x2="410" y2="168" stroke="#444" stroke-width="1.2" marker-end="url(#sm-arrow)"/>
  <text x="425" y="135" font-size="9" fill="#666">ACK</text>

  <line x1="370" y1="214" x2="230" y2="258" stroke="#444" stroke-width="1.2" marker-end="url(#sm-arrow)"/>
  <text x="275" y="232" font-size="9" fill="#666">close / FIN</text>

  <line x1="450" y1="214" x2="455" y2="258" stroke="#444" stroke-width="1.2" marker-end="url(#sm-arrow)"/>
  <text x="470" y="238" font-size="9" fill="#666">FIN / ACK</text>

  <line x1="200" y1="300" x2="200" y2="338" stroke="#444" stroke-width="1.2" marker-end="url(#sm-arrow)"/>
  <text x="215" y="322" font-size="9" fill="#666">ACK</text>

  <line x1="260" y1="360" x2="298" y2="360" stroke="#444" stroke-width="1.2" marker-end="url(#sm-arrow)"/>
  <text x="280" y="353" font-size="9" fill="#666">FIN / ACK</text>

  <line x1="445" y1="300" x2="530" y2="338" stroke="#444" stroke-width="1.2" marker-end="url(#sm-arrow)"/>
  <text x="505" y="315" font-size="9" fill="#666">close / FIN</text>

  <line x1="420" y1="360" x2="498" y2="360" stroke="#444" stroke-width="1.2" marker-end="url(#sm-arrow)"/>
  <text x="460" y="353" font-size="9" fill="#666">timeout</text>
</svg>
