<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="fc-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#444"/>
    </marker>
  </defs>

  <text x="250" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Code Review Process</text>

  <!-- Start -->
  <ellipse cx="250" cy="58" rx="60" ry="20" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="250" y="63" text-anchor="middle" font-size="12" fill="#2E7D32">PR Created</text>

  <!-- Auto checks -->
  <rect x="185" y="106" width="130" height="38" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="250" y="130" text-anchor="middle" font-size="11" fill="#1565C0">Run CI Checks</text>

  <!-- CI Pass? -->
  <polygon points="250,172 325,208 250,244 175,208" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="250" y="212" text-anchor="middle" font-size="11" fill="#E65100">CI Pass?</text>

  <!-- Fix failures -->
  <rect x="355" y="190" width="110" height="36" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="410" y="213" text-anchor="middle" font-size="11" fill="#C62828">Fix Failures</text>

  <!-- Assign reviewer -->
  <rect x="185" y="270" width="130" height="38" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="250" y="294" text-anchor="middle" font-size="11" fill="#1565C0">Assign Reviewer</text>

  <!-- Review -->
  <rect x="185" y="334" width="130" height="38" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="250" y="358" text-anchor="middle" font-size="11" fill="#7B1FA2">Code Review</text>

  <!-- Approved? -->
  <polygon points="250,400 325,436 250,472 175,436" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="250" y="440" text-anchor="middle" font-size="11" fill="#E65100">Approved?</text>

  <!-- Request changes -->
  <rect x="355" y="418" width="120" height="36" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <text x="415" y="441" text-anchor="middle" font-size="11" fill="#F57F17">Push Changes</text>

  <!-- Merge -->
  <ellipse cx="250" cy="520" rx="70" ry="22" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="250" y="525" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Merge to Main</text>

  <!-- arrows -->
  <line x1="250" y1="78" x2="250" y2="104" stroke="#444" stroke-width="1.3" marker-end="url(#fc-arrow)"/>
  <line x1="250" y1="144" x2="250" y2="172" stroke="#444" stroke-width="1.3" marker-end="url(#fc-arrow)"/>

  <!-- CI pass? -> No -> Fix -->
  <line x1="325" y1="208" x2="353" y2="208" stroke="#444" stroke-width="1.3" marker-end="url(#fc-arrow)"/>
  <text x="335" y="202" font-size="10" fill="#C62828">No</text>

  <!-- Fix -> back to CI -->
  <line x1="410" y1="190" x2="410" y2="125" stroke="#444" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="410" y1="125" x2="317" y2="125" stroke="#444" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#fc-arrow)"/>

  <!-- CI pass? -> Yes -> Assign -->
  <line x1="250" y1="244" x2="250" y2="268" stroke="#444" stroke-width="1.3" marker-end="url(#fc-arrow)"/>
  <text x="258" y="260" font-size="10" fill="#2E7D32">Yes</text>

  <line x1="250" y1="308" x2="250" y2="332" stroke="#444" stroke-width="1.3" marker-end="url(#fc-arrow)"/>
  <line x1="250" y1="372" x2="250" y2="400" stroke="#444" stroke-width="1.3" marker-end="url(#fc-arrow)"/>

  <!-- Approved? -> No -> Push changes -->
  <line x1="325" y1="436" x2="353" y2="436" stroke="#444" stroke-width="1.3" marker-end="url(#fc-arrow)"/>
  <text x="335" y="430" font-size="10" fill="#C62828">No</text>

  <!-- Push changes -> back to review -->
  <line x1="475" y1="436" x2="490" y2="436" stroke="#444" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="490" y1="436" x2="490" y2="125" stroke="#444" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="490" y1="125" x2="317" y2="125" stroke="#444" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#fc-arrow)"/>

  <!-- Approved? -> Yes -> Merge -->
  <line x1="250" y1="472" x2="250" y2="496" stroke="#444" stroke-width="1.3" marker-end="url(#fc-arrow)"/>
  <text x="258" y="488" font-size="10" fill="#2E7D32">Yes</text>
</svg>
