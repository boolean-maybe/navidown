<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codeblock Formatting Playground</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0d0d0d;
    color: #ccc;
    height: 100vh;
    overflow: hidden;
  }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 1fr auto;
    height: 100vh;
  }

  .controls {
    grid-row: 1 / 3;
    padding: 16px;
    overflow-y: hidden;
    border-right: 1px solid #222;
    background: #111;
    display: flex;
    flex-direction: column;
  }

  .preview {
    padding: 32px;
    overflow-y: auto;
  }

  .prompt-area {
    border-top: 1px solid #222;
    padding: 12px 24px;
    background: #111;
  }

  .prompt-lines {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .prompt-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .prompt-text {
    flex: 1;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    color: #aaa;
    white-space: pre-wrap;
    line-height: 1.5;
    max-height: 60px;
    overflow-y: auto;
  }

  .prompt-cmd {
    color: #8ab4f8;
    white-space: nowrap;
    overflow-x: auto;
    max-height: none;
  }

  .copy-btn {
    background: #333;
    color: #ccc;
    border: 1px solid #444;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .copy-btn:hover { background: #444; }
  .copy-btn.copied { background: #2a5a2a; border-color: #3a7a3a; color: #8f8; }

  h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #666;
    margin: 20px 0 10px;
    padding-bottom: 4px;
    border-bottom: 1px solid #222;
  }
  h2:first-child { margin-top: 0; }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 6px 0;
    gap: 8px;
  }

  .control-row label {
    font-size: 12px;
    color: #999;
    flex-shrink: 0;
  }

  .control-row .value {
    font-size: 11px;
    color: #666;
    font-family: monospace;
    min-width: 48px;
    text-align: right;
  }

  input[type="range"] {
    flex: 1;
    max-width: 120px;
    accent-color: #666;
  }

  input[type="color"] {
    width: 32px;
    height: 24px;
    border: 1px solid #333;
    border-radius: 3px;
    background: none;
    cursor: pointer;
    padding: 0;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }

  select {
    background: #1a1a1a;
    color: #ccc;
    border: 1px solid #333;
    padding: 4px 6px;
    font-size: 12px;
    border-radius: 3px;
    max-width: 150px;
  }

  .presets {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin: 8px 0;
    flex: 1;
    overflow-y: auto;
  }

  .preset-btn {
    background: #1a1a1a;
    color: #888;
    border: 1px solid #222;
    padding: 6px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .preset-btn:hover { background: #252525; color: #bbb; }
  .preset-btn.active { background: #1e2a1e; border-color: #3a5a3a; color: #adc; }

  .preset-swatch {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    border: 1px solid #444;
    flex-shrink: 0;
  }

  /* Preview code block styling */
  .code-block-wrapper {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre;
    tab-size: 4;
    overflow: hidden;
  }

  .code-border-top, .code-border-bottom, .code-line {
    display: block;
    overflow: hidden;
    white-space: pre;
  }

  .code-container {
    display: flex;
    flex-direction: column;
    gap: 24px;
    max-width: 700px;
    margin: 0 auto;
    padding-bottom: 32px;
  }

  .chroma-token { display: inline; }
</style>
</head>
<body>
<div class="layout">
  <div class="controls">
    <h2>Theme</h2>
    <div class="presets" id="presets"></div>

    <h2>Background</h2>
    <div class="control-row">
      <label>Color</label>
      <input type="color" id="bgColor">
      <span class="value" id="bgColorVal"></span>
    </div>

    <h2>Border</h2>
    <div class="control-row">
      <label>Color</label>
      <input type="color" id="borderColor">
      <span class="value" id="borderColorVal"></span>
    </div>

    <h2>Spacing</h2>
    <div class="control-row">
      <label>Left Padding</label>
      <input type="range" id="leftPad" min="0" max="4" step="1">
      <span class="value" id="leftPadVal"></span>
    </div>

    <h2>Page Background</h2>
    <div class="control-row">
      <label>Color</label>
      <input type="color" id="pageBg">
      <span class="value" id="pageBgVal"></span>
    </div>

  </div>

  <div class="preview" id="previewArea">
    <div class="code-container" id="codeContainer"></div>
  </div>

  <div class="prompt-area">
    <div class="prompt-lines">
      <div class="prompt-row">
        <div class="prompt-text" id="promptOutput"></div>
        <button class="copy-btn" id="copyBtn">Copy</button>
      </div>
      <div class="prompt-row">
        <code class="prompt-text prompt-cmd" id="cmdOutput"></code>
        <button class="copy-btn" id="copyCmdBtn">Copy</button>
      </div>
    </div>
  </div>
</div>

    json: [
      [/"(?:[^"\\]|\\.)*"\s*(?=:)/g, 'keyword'],
      [/"(?:[^"\\]|\\.)*"/g, 'string'],
      [/\b(?:true|false|null)\b/g, 'keyword_type'],
      [/-?\b\d+(?:\.\d+)?(?:[eE][+-]?\d+)?\b/g, 'number'],
    ],
    sql: [
      [/--.*$/gm, 'comment'],
      [/\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|AND|OR|NOT|IN|AS|ORDER|BY|GROUP|HAVING|COUNT|INSERT|UPDATE|DELETE|CREATE|TABLE|INDEX|DROP|ALTER|SET|INTO|VALUES|DEFAULT|PRIMARY|KEY|REFERENCES|CASCADE|UNIQUE|SERIAL|DESC|ASC|LIMIT|OFFSET|WITH|ZONE|NOW)\b/gi, 'keyword'],
      [/\b(VARCHAR|INTEGER|NUMERIC|TIMESTAMP|TEXT|BOOLEAN|INT|BIGINT|FLOAT|DATE|CHAR)\b/gi, 'keyword_type'],
      [/'(?:[^'\\]|\\.)*'/g, 'string'],
      [/\b\d+(?:\.\d+)?\b/g, 'number'],
    ],
    rust: [
      [/\/\/.*$/gm, 'comment'],
      [/\b(fn|let|mut|if|else|for|while|loop|match|return|use|mod|pub|struct|enum|impl|trait|where|type|const|static|ref|move|async|await|unsafe)\b/g, 'keyword'],
      [/\b(i32|i64|u32|u64|f32|f64|bool|str|String|Vec|Option|Result|Self|self)\b/g, 'keyword_type'],
      [/"(?:[^"\\]|\\.)*"/g, 'string'],
      [/\b\d+(?:\.\d+)?\b/g, 'number'],
      [/\b\w+(?=\()/g, 'function'],
    ],
    yaml: [
      [/#.*$/gm, 'comment'],
      [/^[\w.-]+(?=\s*:)/gm, 'keyword'],
      [/"(?:[^"\\]|\\.)*"/g, 'string'],
      [/:\s+(.+)$/gm, 'string'],
      [/\b(true|false|null|yes|no)\b/gi, 'keyword_type'],
      [/\b\d+(?:\.\d+)?\b/g, 'number'],
    ],
  };

  const rules = patterns[lang] || [];
  const spans = [];

  for (const [regex, type] of rules) {
    const re = new RegExp(regex.source, regex.flags);
    let m;
    while ((m = re.exec(code)) !== null) {
      spans.push({ start: m.index, end: m.index + m[0].length, type, text: m[0] });
    }
  }

  // sort by position, remove overlaps
  spans.sort((a, b) => a.start - b.start || b.end - a.end);
  const filtered = [];
  let lastEnd = 0;
  for (const s of spans) {
    if (s.start >= lastEnd) {
      filtered.push(s);
      lastEnd = s.end;
    }
  }

  // build HTML
  let html = '';
  let pos = 0;
  for (const s of filtered) {
    if (s.start > pos) {
      html += escHtml(code.slice(pos, s.start));
    }
    const tokenColor = getTokenColor(s.type);
    html += `<span style="color:${tokenColor}">${escHtml(s.text)}</span>`;
    pos = s.end;
  }
  if (pos < code.length) {
    html += escHtml(code.slice(pos));
  }
  return html;
}

function getTokenColor(type) {
  const t = CHROMA_THEMES[state.theme]?.tokens || CHROMA_THEMES['monokai'].tokens;
  const map = {
    comment: t.comment,
    keyword: t.keyword,
    keyword_reserved: t.keyword_reserved,
    keyword_type: t.keyword_type,
    string: t.string,
    number: t.number,
    function: t.function,
    operator: t.operator,
    punct: t.punct,
    name: t.name,
    decorator: t.decorator,
    class: t.class,
    tag: t.tag,
    attr: t.attr,
    deleted: t.deleted,
    inserted: t.inserted,
  };
  return map[type] || t.text;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// state
const DEFAULTS = {
  theme: 'monokai',
  bgColor: '#272822',
  borderColor: '#808080',
  leftPad: 1,
  pageBg: '#0d0d0d',
};

const state = { ...DEFAULTS };

// auto-generate a preset for every theme
function lightenHex(hex, amount) {
  const r = Math.min(255, parseInt(hex.slice(1,3), 16) + amount);
  const g = Math.min(255, parseInt(hex.slice(3,5), 16) + amount);
  const b = Math.min(255, parseInt(hex.slice(5,7), 16) + amount);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}
function darkenHex(hex, amount) { return lightenHex(hex, -amount); }

const PRESETS = {};
for (const [name, theme] of Object.entries(CHROMA_THEMES)) {
  PRESETS[name] = {
    theme: name,
    bgColor: theme.bg,
    leftPad: 1,
  };
}

// DOM refs
const els = {};
function $(id) { return document.getElementById(id); }

function init() {
  // populate theme list
  const presetsDiv = $('presets');
  for (const [name, preset] of Object.entries(PRESETS)) {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.dataset.theme = name;
    const swatch = document.createElement('span');
    swatch.className = 'preset-swatch';
    swatch.style.background = preset.bgColor;
    btn.appendChild(swatch);
    btn.appendChild(document.createTextNode(name));
    btn.addEventListener('click', () => applyPreset(name));
    presetsDiv.appendChild(btn);
  }

  // bind controls
  bindRange('leftPad', 'leftPadVal', 'leftPad', v => v + ' ch');

  bindColor('bgColor', 'bgColorVal', 'bgColor');
  bindColor('borderColor', 'borderColorVal', 'borderColor');
  bindColor('pageBg', 'pageBgVal', 'pageBg');

  // copy buttons
  function bindCopy(btnId, sourceId) {
    $(btnId).addEventListener('click', function() {
      navigator.clipboard.writeText($(sourceId).textContent).then(() => {
        this.textContent = 'Copied!';
        this.classList.add('copied');
        setTimeout(() => { this.textContent = 'Copy'; this.classList.remove('copied'); }, 1500);
      });
    });
  }
  bindCopy('copyBtn', 'promptOutput');
  bindCopy('copyCmdBtn', 'cmdOutput');

  // apply defaults
  syncControlsToState();
  updateAll();
}

function bindRange(inputId, valId, stateKey, fmt) {
  const input = $(inputId);
  const val = $(valId);
  input.addEventListener('input', function() {
    state[stateKey] = parseInt(this.value);
    val.textContent = fmt(state[stateKey]);
    updateAll();
  });
}

function bindColor(inputId, valId, stateKey) {
  const input = $(inputId);
  const val = $(valId);
  input.addEventListener('input', function() {
    state[stateKey] = this.value;
    val.textContent = this.value;
    updateAll();
  });
}

function syncControlsToState() {
  // highlight active theme in list
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === state.theme);
  });
  $('bgColor').value = state.bgColor;
  $('bgColorVal').textContent = state.bgColor;
  $('borderColor').value = state.borderColor;
  $('borderColorVal').textContent = state.borderColor;
  $('leftPad').value = state.leftPad;
  $('leftPadVal').textContent = state.leftPad + ' ch';
  $('pageBg').value = state.pageBg;
  $('pageBgVal').textContent = state.pageBg;
}

function applyPreset(name) {
  const p = PRESETS[name];
  Object.assign(state, p);
  syncControlsToState();
  updateAll();
}

function updateAll() {
  renderPreview();
  updatePrompt();
}

// build a top border: ╭─ label ─────╮
function buildTopBorder(label, charWidth) {
  if (charWidth < 4) return '';
  const inner = charWidth - 2; // minus corners
  if (label) {
    const labelPart = ' ' + label + ' ';
    const fill = Math.max(0, inner - 1 - labelPart.length); // 1 for leading ─
    return '╭─' + labelPart + '─'.repeat(fill) + '╮';
  }
  return '╭' + '─'.repeat(inner) + '╮';
}

function buildBottomBorder(charWidth) {
  if (charWidth < 4) return '';
  return '╰' + '─'.repeat(charWidth - 2) + '╯';
}

function renderPreview() {
  const container = $('codeContainer');
  const area = $('previewArea');
  const textColor = CHROMA_THEMES[state.theme]?.tokens.text || '#ccc';
  const borderColor = state.borderColor;
  // approximate character width from the container
  const charWidth = 72;

  container.innerHTML = '';
  for (const [lang, code] of Object.entries(CODE_SAMPLES)) {
    const wrapper = document.createElement('div');
    wrapper.className = 'code-block-wrapper';
    wrapper.style.width = charWidth + 'ch';

    // top border with language label
    const top = document.createElement('span');
    top.className = 'code-border-top';
    top.style.color = borderColor;
    top.style.background = state.bgColor;
    top.textContent = buildTopBorder(lang, charWidth);
    wrapper.appendChild(top);

    // code lines: each line gets bg fill across full width
    const lines = code.split('\n');
    const innerWidth = charWidth - 2; // minus side borders
    const linesDiv = document.createElement('span');
    linesDiv.className = 'code-lines';
    for (const line of lines) {
      const lineEl = document.createElement('span');
      lineEl.className = 'code-line';
      lineEl.style.background = state.bgColor;

      // build: │ + code (padded to innerWidth with spaces) + │
      // borders get border color fg + code bg
      const leftB = `<span style="color:${borderColor}">│</span>`;
      const rightB = `<span style="color:${borderColor}">│</span>`;
      const lp = state.leftPad;
      const codeHtml = tokenize(line, lang);
      const visLen = line.length + lp;
      const pad = Math.max(0, innerWidth - visLen);
      lineEl.innerHTML = leftB +
        `<span style="color:${textColor}">${' '.repeat(lp)}${codeHtml}${' '.repeat(pad)}</span>` +
        rightB;

      linesDiv.appendChild(lineEl);
    }
    wrapper.appendChild(linesDiv);

    // bottom border
    const bottom = document.createElement('span');
    bottom.className = 'code-border-bottom';
    bottom.style.color = borderColor;
    bottom.style.background = state.bgColor;
    bottom.textContent = buildBottomBorder(charWidth);
    wrapper.appendChild(bottom);

    container.appendChild(wrapper);
  }

  area.style.background = state.pageBg;
}

function updatePrompt() {
  const parts = [];

  parts.push(`Use the "${state.theme}" chroma theme for syntax highlighting`);

  if (state.bgColor !== CHROMA_THEMES[state.theme]?.bg) {
    parts.push(`code block background color ${state.bgColor}`);
  }

  parts.push(`border color ${state.borderColor}`);

  if (state.leftPad > 0) {
    parts.push(`${state.leftPad} character left padding`);
  }

  const prompt = `Style the code blocks with: ${parts.join('; ')}.`;
  $('promptOutput').textContent = prompt;

  // build CLI command
  const cmdParts = ['go run ./cmd/tview'];
  if (state.theme !== 'dark (glamour default)') {
    cmdParts.push(`--syntax-theme '${state.theme}'`);
  }
  if (state.bgColor !== CHROMA_THEMES[state.theme]?.bg) {
    cmdParts.push(`--syntax-background '${state.bgColor}'`);
  }
  if (state.borderColor !== DEFAULTS.borderColor) {
    cmdParts.push(`--syntax-border '${state.borderColor}'`);
  }
  cmdParts.push('test-codeblocks.md');
  $('cmdOutput').textContent = cmdParts.join(' ');
}

init();
</script>
</body>
</html>
